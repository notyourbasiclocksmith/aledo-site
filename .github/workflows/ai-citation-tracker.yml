name: AI citation tracker

# Weekly cron — polls AI providers for brand mention + URL citation rate
# on 50 target EN+ES buyer-intent prompts.
#
# Setup — repo secrets (Settings → Secrets and variables → Actions):
#   OPENAI_API_KEY     — required for ChatGPT poll
#   ANTHROPIC_API_KEY  — required for Claude poll
#   PERPLEXITY_API_KEY — required for Perplexity poll
#   GEMINI_API_KEY     — required for Gemini poll

on:
  schedule:
    - cron: '0 9 * * 1' # Mon 09:00 UTC (portfolio canonical)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run AI citation tracker
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/ai-citation-tracker.mjs
      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/ai-citation-history.jsonl
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(seo): weekly AI citation tracker run"
            git push
          fi
